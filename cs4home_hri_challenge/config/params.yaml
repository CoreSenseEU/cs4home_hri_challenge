/**:
  ros__parameters:
    waypoints_names: ["entrance", "party", "guest_confirmation"]
    waypoints: # [x, y, yaw] only 3 numbers!!
      entrance: [1.175, 6.833, 1.350]
      party: [1.215, 4.201, 0.002]
      guest_confirmation: [1.256, 3.978, 0.003]

hri_challenge_master:
  ros__parameters:
    flows: [flow_1, flow_2]
    flow_1: [greeting_guest_cognitive_module, describe_person_cognitive_module]
    flow_2: [greeting_guest_cognitive_module, describe_person_cognitive_module, find_seat_cognitive_module]
    on_startup: [greeting_guest_cognitive_module]  # Node auto-activates HAS TO BE INSIDE FLOW 1


greeting_guest_cognitive_module:
  ros__parameters:
    core: execute_bt
    efferent: transition_output
    plugin_list:
    - activation_control_bt_node
    - init_receptionist_bt_node
    - look_at_bt_node
    - speak_bt_node
    - is_detected_bt_node
    - pan_bt_node
    - filter_entity_bt_node
    - extract_entity_color_bt_node
    - listen_bt_node
    - query_bt_node
    - dialogConfirmation_bt_node
    - store_detection_bt_node
    - move_to_bt_node
    - check_policy_bt_node
    - store_guest_info_bt_node
    - sleep_bt_node
    bt_name: 'greeting_guest.xml'
    # New completion topic for flow management
    transition_output:
      topics: ['greeting_guest_cognitive_module/completion']
      types: ['std_msgs/msg/Bool']


find_seat_cognitive_module:
  ros__parameters:
    core: execute_bt
    efferent: transition_output
    plugin_list:
    - init_receptionist_bt_node
    - activation_control_bt_node
    - move_to_bt_node
    - is_sittable_bt_node
    - point_at_bt_node
    - play_motion_predefined_bt_node
    - speak_bt_node
    - is_detected_bt_node
    - pan_bt_node
    - look_at_bt_node
    - sleep_bt_node
    - remove_string_prefix_bt_node
    - get_attended_guest_bt_node
    - check_policy_bt_node
    bt_name: 'find_seat.xml'
    transition_output:
      topics: ['find_seat_cognitive_module/completion']
      types: ['std_msgs/msg/Bool']


