hri_challenge_master:
  ros__parameters:
    flows: [main_flow]
    
    # Simple sequential flow for testing
    main_flow:
      # Start with first module
      initial_states: [greeting_guest_cognitive_module]
      
      # Sequence: greeting -> describe -> find_seat -> loop back to greeting
      main_flow: [greeting_guest_cognitive_module, describe_person_cognitive_module, find_seat_cognitive_module]

# Test modules with always-success BTs
greeting_guest_cognitive_module:
  ros__parameters:
    core: execute_bt
    efferent: transition_output
    plugin_list: []  # No plugins needed for test
    bt_name: 'test_greeting_guest.xml'
    transition_output:
      topics: ['completion']
      types: ['std_msgs/msg/Bool']

describe_person_cognitive_module:
  ros__parameters:
    core: execute_bt
    efferent: transition_output
    plugin_list: []
    bt_name: 'test_describe_person.xml'
    transition_output:
      topics: ['completion']
      types: ['std_msgs/msg/Bool']

find_seat_cognitive_module:
  ros__parameters:
    core: execute_bt
    efferent: transition_output
    plugin_list: []
    bt_name: 'test_find_seat.xml'
    transition_output:
      topics: ['completion']
      types: ['std_msgs/msg/Bool']
